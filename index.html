<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Filtercam</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  height:100vh; overflow:hidden; background:#fff;
  display:flex; flex-direction:column;
}
.screen { display:none; width:100%; height:100%; flex-direction:column; }
.screen.active { display:flex; }

/* SCREEN 1 */
#screen1 { background:#fff; }
#s1-top {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:40px 32px;
}
#s1-icon {
  width:96px; height:96px; background:#f2f2f2;
  display:flex; align-items:center; justify-content:center; margin-bottom:28px;
}
#s1-title { font-size:28px; font-weight:700; color:#111; letter-spacing:-0.5px; margin-bottom:10px; }
#s1-desc { font-size:15px; color:#bbb; text-align:center; line-height:1.6; max-width:260px; }
#s1-bottom { display:flex; flex-direction:column; gap:1px; }
.s1-btn {
  padding:20px; border:none; font-family:inherit; font-size:15px;
  font-weight:600; cursor:pointer; display:flex; align-items:center;
  gap:12px; width:100%; text-align:left;
}
#btn-camera { background:#111; color:#fff; }
#fi-camera { display:none; }

/* SCREEN 2 */
#screen2 { background:#000; }
#topbar {
  height:52px; background:#000; display:flex; align-items:center;
  justify-content:space-between; padding:0 16px; flex-shrink:0;
}
#back-btn {
  background:none; border:none; color:#888; font-family:inherit;
  font-size:13px; font-weight:500; cursor:pointer; padding:6px 0;
}
#filter-label { color:#666; font-size:13px; font-weight:500; }
#save-btn {
  background:none; border:none; color:#444; font-family:inherit;
  font-size:13px; font-weight:600; padding:6px 0; cursor:pointer;
}
#save-btn.on { color:#fff; }

#photo-area {
  flex:1; background:#000; display:flex; align-items:center;
  justify-content:center; position:relative; overflow:hidden;
}
#photo-canvas { max-width:100%; max-height:100%; display:none; }

#overlay-btns {
  display:none; position:absolute;
  bottom:14px; left:14px; right:14px; flex-direction:row; gap:8px;
}
#overlay-btns.show { display:flex; }
.ov-btn {
  flex:1; height:42px; border:none; font-family:inherit;
  font-size:12px; font-weight:600; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.1); color:#fff;
}
#remove-btn { background:rgba(200,30,30,0.25); color:#ff6060; }

#filter-panel { height:130px; background:#0a0a0a; flex-shrink:0; }
#filter-scroll {
  display:flex; flex-direction:row; overflow-x:auto;
  height:100%; gap:2px; padding:2px; scrollbar-width:none;
}
#filter-scroll::-webkit-scrollbar { display:none; }
.f-item {
  flex:1; min-width:80px; display:flex; flex-direction:column;
  cursor:pointer; background:#111;
}
.f-item.active { border-top:2px solid #fff; }
.f-item.active .f-name { color:#fff; }
.f-preview { flex:1; overflow:hidden; background:#1c1c1c; }
.f-preview canvas, .f-preview .no-prev { width:100%; height:100%; display:block; }
.f-preview .no-prev { background:#1c1c1c; }
.f-name {
  height:26px; display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:600; color:#555; flex-shrink:0;
}

/* new photo file input hidden */
#fi-new { display:none; }
</style>
</head>
<body>

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">
  <div id="s1-top">
    <div id="s1-icon">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.4">
        <rect x="2" y="7" width="20" height="14"/>
        <circle cx="12" cy="14" r="3.5"/>
        <path d="M8 7V5h8v2"/>
      </svg>
    </div>
    <div id="s1-title">Filtercam</div>
    <div id="s1-desc">Take a photo and apply beautiful filters in one tap</div>
  </div>
  <div id="s1-bottom">
    <label class="s1-btn" id="btn-camera" for="fi-camera">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="7" width="20" height="14"/>
        <circle cx="12" cy="14" r="3.5"/>
        <path d="M8 7V5h8v2"/>
      </svg>
      Take a Photo
      <input type="file" id="fi-camera" accept="image/*" capture="camera">
    </label>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
  <div id="topbar">
    <button id="back-btn">&#8592; Back</button>
    <span id="filter-label">None</span>
    <button id="save-btn">Save</button>
  </div>
  <div id="photo-area">
    <canvas id="photo-canvas"></canvas>
    <div id="overlay-btns">
      <label class="ov-btn" for="fi-new">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14"/>
          <circle cx="12" cy="14" r="3.5"/>
          <path d="M8 7V5h8v2"/>
        </svg>
        New Photo
        <input type="file" id="fi-new" accept="image/*" capture="camera">
      </label>
      <button class="ov-btn" id="remove-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
        Remove
      </button>
    </div>
  </div>
  <div id="filter-panel">
    <div id="filter-scroll"></div>
  </div>
</div>

<script>
const FILTERS = [
  { name:"None",   css:"none" },
  { name:"Mono",   css:"grayscale(100%)" },
  { name:"Sepia",  css:"sepia(100%)" },
  { name:"Fade",   css:"brightness(1.2) contrast(0.75) saturate(0.7)" },
  { name:"Chrome", css:"contrast(1.4) saturate(1.6) brightness(1.05)" },
  { name:"Noir",   css:"grayscale(100%) contrast(1.6) brightness(0.75)" },
  { name:"Warm",   css:"hue-rotate(-30deg) saturate(1.4) brightness(1.05)" },
  { name:"Cool",   css:"hue-rotate(200deg) saturate(1.2)" },
];

let img = null, filterCss = "none";
const s1 = document.getElementById("screen1");
const s2 = document.getElementById("screen2");
const canvas = document.getElementById("photo-canvas");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay-btns");
const saveBtn = document.getElementById("save-btn");
const filterLabel = document.getElementById("filter-label");
const filterScroll = document.getElementById("filter-scroll");

function goS1() { s2.classList.remove("active"); s1.classList.add("active"); }
function goS2() { s1.classList.remove("active"); s2.classList.add("active"); }

function loadImg(src) {
  const i = new Image();
  i.onload = function() {
    img = i;
    filterCss = "none";
    filterLabel.textContent = "None";
    document.querySelectorAll(".f-item").forEach((el,idx) => el.classList.toggle("active", idx===0));
    canvas.style.display = "block";
    overlay.classList.add("show");
    saveBtn.classList.add("on");
    goS2();
    renderMain();
    renderThumbs();
  };
  i.src = src;
}

function readFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => loadImg(e.target.result);
  r.readAsDataURL(file);
}

document.getElementById("fi-camera").addEventListener("change", e => { readFile(e.target.files[0]); e.target.value=""; });
document.getElementById("fi-new").addEventListener("change", e => { readFile(e.target.files[0]); e.target.value=""; });

document.getElementById("back-btn").addEventListener("click", () => {
  img=null; filterCss="none";
  canvas.style.display="none";
  overlay.classList.remove("show");
  saveBtn.classList.remove("on");
  filterLabel.textContent="None";
  document.querySelectorAll(".f-item").forEach((el,i)=>el.classList.toggle("active",i===0));
  FILTERS.forEach((f,i)=>{
    const slot=filterScroll.children[i]; if(!slot) return;
    const prev=slot.querySelector(".f-preview");
    if(prev) prev.innerHTML='<div class="no-prev" id="fp-'+i+'"></div>';
  });
  goS1();
});

document.getElementById("remove-btn").addEventListener("click", () => {
  document.getElementById("back-btn").click();
});

saveBtn.addEventListener("click", function() {
  if (!img) return;
  const full = document.createElement("canvas");
  full.width=img.width; full.height=img.height;
  const fc=full.getContext("2d");
  fc.filter=filterCss==="none"?"none":filterCss;
  fc.drawImage(img,0,0);
  const a=document.createElement("a");
  a.download="filtercam-"+Date.now()+".jpg";
  a.href=full.toDataURL("image/jpeg",0.92);
  a.click();
});

FILTERS.forEach((f,i)=>{
  const item=document.createElement("div");
  item.className="f-item"+(i===0?" active":"");
  const prev=document.createElement("div"); prev.className="f-preview";
  const np=document.createElement("div"); np.className="no-prev"; np.id="fp-"+i;
  prev.appendChild(np);
  const name=document.createElement("div"); name.className="f-name"; name.textContent=f.name;
  item.appendChild(prev); item.appendChild(name); filterScroll.appendChild(item);
  item.addEventListener("click",function(){
    document.querySelectorAll(".f-item").forEach(el=>el.classList.remove("active"));
    item.classList.add("active"); filterCss=f.css;
    filterLabel.textContent=f.name; if(img) renderMain();
  });
});

function renderMain(){
  const area=document.getElementById("photo-area");
  const r=Math.min(area.clientWidth/img.width, area.clientHeight/img.height);
  canvas.width=Math.round(img.width*r); canvas.height=Math.round(img.height*r);
  ctx.filter=filterCss==="none"?"none":filterCss;
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
}

function renderThumbs(){
  FILTERS.forEach((f,i)=>{
    const el=document.getElementById("fp-"+i); if(!el||!img) return;
    const tc=document.createElement("canvas"); tc.width=80; tc.height=104;
    const tc2=tc.getContext("2d");
    tc2.filter=f.css==="none"?"none":f.css;
    tc2.drawImage(img,0,0,80,104); el.replaceWith(tc);
  });
}

window.addEventListener("resize",()=>{ if(img) renderMain(); });
</script>
</body>
</html>
